name: Collect Repo Stats

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: read
  pull-requests: read
  # administration: read — uncomment (or use a PAT) to enable traffic metrics
  #   (page-views, unique-visitors, clones, unique-cloners)

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build action bundles
        run: npm run build

      - name: Collect repo stats
        uses: ./actions/repo-stats
        id: stats
        with:
          github-token: ${{ github.token }}

      - name: Stash repo stats
        uses: ./actions/stash
        id: stash
        with:
          results: ${{ steps.stats.outputs.results-file }}
          format: otlp
          run-id: repo-stats-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Aggregate
        uses: ./actions/aggregate
        with:
          max-runs: 0
          badges: 'true'

      - name: Compare to previous
        uses: ./actions/compare
        with:
          thresholds: |
            workflow_success_pct: 5%
            open_issues: 20%
            test_count: 5%

      - name: Trigger pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
