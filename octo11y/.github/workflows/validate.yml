name: Validate

on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Validate schemas
        run: node --test schema/schema.test.mjs

      - name: Build and test workspaces
        run: npm run test

      - name: Lint workspaces
        run: npm run lint
