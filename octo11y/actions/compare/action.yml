name: 'Benchkit Compare'
description: 'Compare benchmark results against a baseline on the data branch and report regressions.'
inputs:
  results:
    description: 'Path or glob pattern to benchmark result file(s) for the current run.'
    required: true
  format:
    description: 'Input format: auto, go, rust, hyperfine, pytest-benchmark, benchmark-action, or otlp.'
    required: false
    default: 'auto'
  data-branch:
    description: 'Branch used for benchmark data storage.'
    required: false
    # Keep in sync with DEFAULT_DATA_BRANCH in @benchkit/format
    default: 'bench-data'
  baseline-runs:
    description: 'Number of most recent baseline runs to average.'
    required: false
    default: '5'
  threshold:
    description: 'Percentage change threshold for regression detection.'
    required: false
    default: '5'
  matrix-policy:
    description: 'Optional matrix policy JSON string or path to a JSON file for required/probe lane completeness and gating.'
    required: false
  fail-on-regression:
    description: 'Fail the action step when a regression is detected, or when a matrix policy is provided and required lanes fail or go missing.'
    required: false
    default: 'false'
  comment-on-pr:
    description: 'Post comparison results as a PR comment.'
    required: false
    default: 'true'
  github-token:
    description: 'Token with read access to the data branch and permission to comment on pull requests.'
    required: false
    default: ${{ github.token }}
outputs:
  has-regression:
    description: "'true' if any benchmark regressed beyond the threshold, 'false' otherwise."
  has-required-failure:
    description: "'true' if any required matrix lane failed or is missing, 'false' otherwise."
  missing-result-count:
    description: "Number of expected matrix lanes with no current result."
  required-passed-count:
    description: "Number of required matrix lanes that passed."
  required-failed-count:
    description: "Number of required matrix lanes that failed."
  probe-failed-count:
    description: "Number of probe matrix lanes that failed."
  matrix-summary-json:
    description: 'JSON-encoded matrix completeness and lane outcome summary.'
  summary:
    description: 'Markdown-formatted comparison report.'
runs:
  using: 'node24'
  main: 'dist/index.js'
