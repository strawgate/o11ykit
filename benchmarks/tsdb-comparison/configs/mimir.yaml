# Mimir monolithic mode — minimal config for benchmarking
target: all

server:
  http_listen_port: 9009
  grpc_listen_port: 9095

distributor:
  ring:
    kvstore:
      store: inmemory
    instance_addr: 127.0.0.1

ingester:
  ring:
    kvstore:
      store: inmemory
    replication_factor: 1
    instance_addr: 127.0.0.1

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks
  tsdb:
    dir: /data/tsdb

store_gateway:
  sharding_ring:
    kvstore:
      store: inmemory

compactor:
  sharding_ring:
    kvstore:
      store: inmemory
  data_dir: /data/compactor

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/rules

limits:
  native_histograms_ingestion_enabled: true

activity_tracker:
  filepath: /data/activity.log
