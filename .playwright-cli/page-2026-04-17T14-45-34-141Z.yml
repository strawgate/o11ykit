            - strong [ref=e147]: 1 bit per sample
            - text: . Irregular intervals use 9–68 bits with zigzag encoding.
          - code [ref=e149]: DoD == 0 → '0' (1 bit) DoD in [-63, 64] → '10' + 7-bit zz (9 bits) DoD in [-255, 256] → '110' + 9-bit zz (12 bits) DoD in [-2047,2048] → '1110' + 12-bit (16 bits) Otherwise → '1111' + raw 64 (68 bits)
