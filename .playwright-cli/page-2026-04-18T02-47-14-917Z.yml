    - generic [ref=e183]:
      - heading "Quick Start" [level=2] [ref=e184]
      - paragraph [ref=e185]: "Use the TSDB engine in three steps: create a store, ingest data, and query."
      - code [ref=e187]: "import { FlatStore, ChunkedStore, ColumnStore, ScanEngine, encodeChunk, decodeChunk } from 'o11ytsdb'; // 1. Create a storage backend const store = new ChunkedStore({ name: 'xor-delta', encode: encodeChunk, decode: decodeChunk }); // 2. Ingest time-series data const labels = new Map([['__name__', 'http_requests'], ['method', 'GET'], ['region', 'us-east']]); const seriesId = store.getOrCreateSeries(labels); const timestamps = BigInt64Array.from({ length: 10000 }, (_, i) => BigInt(Date.now() - (10000 - i) * 1000) * 1_000_000n); const values = Float64Array.from({ length: 10000 }, (_, i) => 100 + Math.sin(i / 50) * 30 + Math.random() * 5); store.appendBatch(seriesId, timestamps, values); // 3. Query with aggregation const engine = new ScanEngine(); const result = engine.query(store, { metric: 'http_requests', start: timestamps[0], end: timestamps[timestamps.length - 1], agg: 'avg', groupBy: ['region'], step: 10_000_000_000n, // 10-second buckets }); console.log(`Found ${result.series.length} groups, scanned ${result.scannedSamples} samples`);"
