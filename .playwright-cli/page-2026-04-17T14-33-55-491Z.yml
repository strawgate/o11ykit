    - heading "XOR-Delta Compression" [level=2] [ref=e138]
    - paragraph [ref=e139]: Based on Facebook's Gorilla paper (VLDB 2015). Timestamps use delta-of-delta with zigzag encoding. Values use XOR with leading/trailing zero tracking.
