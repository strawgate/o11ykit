            - text: . Similar values reuse the leading/trailing zero window from the previous sample.
          - code [ref=e153]: XOR == 0 → '0' (1 bit) Reuse window → '10' + meaningful (2 + N bits) New window → '11' + 6L + 6M (14 + N bits)
