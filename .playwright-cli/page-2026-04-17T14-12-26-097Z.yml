    - heading "XOR-Delta Compression" [level=2] [ref=e135]
    - paragraph [ref=e136]: Based on Facebook's Gorilla paper (VLDB 2015). Timestamps use delta-of-delta with zigzag encoding. Values use XOR with leading/trailing zero tracking.
    - generic [ref=e137]:
      - generic [ref=e138]:
        - generic [ref=e139]: "1"
        - generic [ref=e140]:
          - 'heading "Timestamp: Delta-of-Delta" [level=4] [ref=e141]'
          - paragraph [ref=e142]:
            - text: Regular intervals compress to
            - strong [ref=e143]: 1 bit per sample
            - text: . Irregular intervals use 9–68 bits with zigzag encoding.
          - code [ref=e145]: DoD == 0 → '0' (1 bit) DoD in [-63, 64] → '10' + 7-bit zz (9 bits) DoD in [-255, 256] → '110' + 9-bit zz (12 bits) DoD in [-2047,2048] → '1110' + 12-bit (16 bits) Otherwise → '1111' + raw 64 (68 bits)
