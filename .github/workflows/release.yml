name: release-all-packages-lockstep

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            octo11y/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install octo11y dependencies
        run: npm run octo11y:install

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@^11.11.0
          npm --version

      - name: Build publishable packages
        run: |
          npm run build:packages
          cd octo11y
          npm run build --workspace=packages/core
          npm run build --workspace=packages/format
          npm run build --workspace=packages/chart
          npm run build --workspace=packages/adapters

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ""
