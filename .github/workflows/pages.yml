name: deploy-o11ykit-github-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /o11ykit/otlpkit/
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build package workspaces
        run: npm run build:packages

      - name: Build octo11y package workspaces
        run: npm run build:octo-packages

      - name: Build demo workspace
        run: npm run build --workspace @otlpkit/example-demo

      - name: Build dashboard experiences
        env:
          BASE_PATH: /o11ykit/experiences/dashboard/
        run: npm run build --workspace=@benchkit/dashboard

      - name: Build tracesdb engine site
        env:
          BASE_PATH: /o11ykit/tracesdb-engine/
        run: npx vite build site/tracesdb-engine

      - name: Assemble site artifact
        run: |
          rm -rf .site
          mkdir -p .site/otlpkit .site/experiences/dashboard
          cp -R site/* .site/
          # Replace raw tracesdb-engine with Vite-built version
          rm -rf .site/tracesdb-engine/js .site/tracesdb-engine/dist
          cp -R site/tracesdb-engine/dist/* .site/tracesdb-engine/
          cp -R examples/demo/dist/* .site/otlpkit/
          cp -R octo11y/packages/dashboard/dist/* .site/experiences/dashboard/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
