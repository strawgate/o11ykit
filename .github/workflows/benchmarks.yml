name: ingest-benchmark-sample-data

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: read
  contents: write

jobs:
  benchmark-and-stash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Emit benchmark output
        shell: bash
        run: |
          node <<'EOF' | tee benchmark-results.txt
          function runBench(name, fn, iterations) {
            const start = process.hrtime.bigint();
            for (let i = 0; i < iterations; i += 1) fn(i);
            const end = process.hrtime.bigint();
            const durationNs = Number(end - start);
            const nsPerOp = Math.max(1, Math.round(durationNs / iterations));
            console.log(
              `Benchmark${name}-8\t${iterations}\t${nsPerOp} ns/op\t0 B/op\t0 allocs/op`
            );
          }

          runBench("StringConcat", (i) => {
            const value = `o11ykit-${i}`;
            return value.toUpperCase();
          }, 500000);

          runBench("ObjectMerge", (i) => {
            const base = { a: i, b: i + 1 };
            return { ...base, c: i + 2 };
          }, 300000);
          EOF

      - name: Parse and stash benchmark results
        uses: ./actions/parse-results
        with:
          mode: file
          results: benchmark-results.txt
          format: go
          github-token: ${{ github.token }}
          run-id: ${{ github.run_id }}-${{ github.run_attempt }}--benchmark

  aggregate-results:
    needs:
      - benchmark-and-stash
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aggregate bench-data branch
        uses: strawgate/o11ykit/octo11y/actions/aggregate@main-dist
        with:
          github-token: ${{ github.token }}
