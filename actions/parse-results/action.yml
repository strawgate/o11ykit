name: "o11ykit Parse Results"
description: "Parse benchmark output from workflow logs (auto mode) or files (file mode), then stash by default."

inputs:
  mode:
    description: "Source mode: auto (download current workflow attempt logs) or file (read the results input)."
    required: false
    default: "auto"
  results:
    description: "Path or glob pattern to benchmark result file(s). Required when mode=file."
    required: false
  format:
    description: "Input format: auto (default), go, rust, hyperfine, pytest-benchmark, benchmark-action, or otlp."
    required: false
    default: "auto"
  data-branch:
    description: "Branch used for benchmark data storage."
    required: false
    default: "bench-data"
  github-token:
    description: "Token used to download logs in auto mode and push when commit-results=true."
    required: false
    default: ${{ github.token }}
  run-id:
    description: "Custom run identifier. Defaults to {GITHUB_RUN_ID}-{GITHUB_RUN_ATTEMPT}--{GITHUB_JOB}."
    required: false
  source-run-id:
    description: "Workflow run id to read logs from when mode=auto. Defaults to current run."
    required: false
  source-run-attempt:
    description: "Workflow run attempt to read logs from when mode=auto."
    required: false
  source-job:
    description: "Preferred job name to read logs from when mode=auto run logs are unavailable."
    required: false
  monitor-results:
    description: "Path to OTLP JSON monitor output. When provided, monitor metrics are merged before writing."
    required: false
  commit-results:
    description: "When false, parse and output OTLP JSON but do not commit it to the data branch."
    required: false
    default: "true"
  fail-on-zero-datapoints:
    description: "When true, fail if parsed OTLP contains zero datapoints."
    required: false
    default: "false"
  min-datapoints:
    description: "Minimum datapoints required for success. Use 0 to disable."
    required: false
    default: "0"
  summary:
    description: "When true, write a parsed benchmark summary to GITHUB_STEP_SUMMARY."
    required: false
    default: "true"

outputs:
  run-id:
    description: "The run identifier used for this result."
  file-path:
    description: "Path to stored JSON on the data branch, or temp output path when commit-results=false."
  source:
    description: "Resolved source mode used by this run (auto or file)."
  datapoint-count:
    description: "Total metric datapoint count in the normalized OTLP document."
  resource-metrics-count:
    description: "Total resourceMetrics entries in the normalized OTLP document."
  has-metrics:
    description: "true when datapoint-count > 0, otherwise false."
  normalized-otlp-path:
    description: "Local filesystem path to the normalized OTLP JSON document."

runs:
  using: "node24"
  main: "dist/index.js"
