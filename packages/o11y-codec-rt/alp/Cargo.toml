# ALP (Adaptive Lossless floating-Point) and Delta-ALP codec.
# Pure-Rust slice API. Scratch buffers used during encode/decode are
# stack-allocated; on wasm32 (1 MB default stack) the worst-case
# ~50 KB residency is safe.
#
# Reference: Afroozeh et al., SIGMOD 2024 (ALP).

[lib]

[dependencies]
o11y-codec-rt-core = { path = "../core" }

