[package]
name = "o11ytsdb-wasm"
version = "0.0.1"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }

[profile.release]
opt-level = "z"      # Optimize for size
lto = "fat"          # Full LTO; inlines aggressively across the
                     # o11y-codec-rt-core crate boundary so the
                     # extracted bit-I/O primitives stay free.
codegen-units = 1    # Single codegen unit for best optimization
strip = true         # Strip debug info
panic = "abort"      # No unwinding — smaller binary

[dependencies]
# wasm-bindgen is intentionally omitted — raw #[no_mangle] exports
# keep the binary small and the ABI identical to the Zig version.
# The shared codec workspace at packages/o11y-codec-rt holds bit I/O
# and other primitives this crate (and o11ylogsdb's binding crate)
# both consume. No other deps; we still go bare-metal for size.
o11y-codec-rt-core = { path = "../../o11y-codec-rt/core" }
o11y-codec-rt-xor-delta = { path = "../../o11y-codec-rt/xor-delta" }
o11y-codec-rt-alp = { path = "../../o11y-codec-rt/alp" }
