[package]
name = "o11y-drain"
version = "0.0.1"
edition = "2021"
publish = false

# Streaming Drain log template extractor (He et al., ICWS 2017),
# in-house port targeting wasm32-unknown-unknown. No std, no allocator
# beyond what the `alloc` crate needs. Mirrors the size profile of
# packages/o11ytsdb/rust/Cargo.toml.

[lib]
crate-type = ["cdylib", "rlib"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }

[profile.release]
opt-level = "z"      # Optimize for size
lto = true           # Link-time optimization
codegen-units = 1    # Single codegen unit for best optimization
strip = true         # Strip debug info
panic = "abort"      # No unwinding -- smaller binary

[dependencies]
# No deps. Bare-metal port for smallest WASM binary.
# wasm-bindgen intentionally omitted; we expose raw #[no_mangle] extern
# "C" entry points and let the host drive linear memory directly.
